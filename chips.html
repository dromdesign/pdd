<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feed</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    }

    body {
      margin: 0;
      background: #fff;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 430px;
      padding: 16px;
      margin-bottom: 60px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 40px;
    }

    .chip {
      padding: 10px 14px;
      border-radius: 9px;
      background: #eee;
      font-size: 14px;
      cursor: pointer;
      user-select: none;
    }

    .chip.active {
      background: #000;
      color: #fff;
    }

    .feed {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .card {
      cursor: pointer;
      transition:
      transform 0.35s ease-out,
      opacity 0.35s ease-out;
    }


    .img {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #d9d9d9;
      border-radius: 18px;
      overflow: hidden;
    }

    .img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .title {
      margin-top: 10px;
      font-size: 20px;
      font-weight: 700;
      line-height: 24px;
    }

    h1 {
      margin: 10px 0 32px;
    }
  </style>
</head>

<body>

<div class="app">

  <h1>Твоя первая</h1>

  <!-- GROUP -->
  <div class="chips" id="groupChips">
    <div class="chip active" data-group="all">Все темы</div>
    <div class="chip" data-group="1">Цены авто</div>
    <div class="chip" data-group="2">Выбор и покупка</div>
    <div class="chip" data-group="3">Подборки авто</div>
    <div class="chip" data-group="4">Эксплуатация</div>
    <div class="chip" data-group="5">Это интересно знать</div>
  </div>

  <!-- TYPE -->
  <div class="chips" id="typeChips">
    <div class="chip active" data-type="new">Новые</div>
    <div class="chip" data-type="popular">Популярные</div>
  </div>

  <div class="feed" id="feed"></div>

</div>

<script>
  const titles = [

    // ГРУППА 1
    "Хочу недорого и красиво: эффектные авто до миллиона рублей",
    "Как не переплатить при покупке машины",
    "Какие машины дешевеют медленнее остальных",

    // ГРУППА 2
    "Как не переплатить при покупке машины",
    "ТОП ошибок при выборе авто",
    "Стоит ли покупать авто после такси",

    // ГРУППА 3
    "ТОП-10 бюджетных машин",
    "Какой седан выбрать до 500 тысяч рублей?",
    "И по городу, и на природу: какие автомобили больше подходят под ваши цели?",

    // ГРУППА 4
    "Сломался на дороге. Что делать?",
    "Что убивает двигатель быстрее всего",
    "Решил купить дешевую мшину с пробегом. К чему надо быть готовым?",

    // ГРУППА 5
    "Как проверить что у машины все в порядке с документами и она не битая?",
    "Страховка: что это и зачем нужна?",
    "Как понять что пробег скручен"
  ];

  const groups = [

    // ГРУППА 1
    1,1,1,

    // ГРУППА 2
    2,2,2,

    // ГРУППА 3
    3,3,3,

    // ГРУППА 4
    4,4,4,

    // ГРУППА 5
    5,5,5
  ];

  const types = [

    // ГРУППА 1
    "new","popular","new",

    // ГРУППА 2
    "new","popular","new",

    // ГРУППА 3
    "new","popular","new",

    // ГРУППА 4
    "new","popular","new",

    // ГРУППА 5
    "new","popular","new"
  ];

  const feed = document.getElementById("feed");

  // создаём карточки
  for (let i = 0; i < titles.length; i++) {

    const card = document.createElement("div");

    card.className = "card";

    card.dataset.group = groups[i];
    card.dataset.type = types[i];

    // индекс внутри группы
    card.dataset.indexInGroup = groups
      .slice(0, i)
      .filter(g => g === groups[i]).length;

    card.innerHTML = `
      <div class="img">
        <img src="img/pic-${String(i + 1).padStart(2,'0')}.jpg" />
      </div>

      <div class="title">
        ${titles[i]}
      </div>
    `;

    feed.appendChild(card);
  }

  let activeGroup = "all";
  let activeType = "new";

  const groupChips = document.querySelectorAll("#groupChips .chip");
  const typeChips = document.querySelectorAll("#typeChips .chip");
  const cards = Array.from(document.querySelectorAll(".card"));

  function applyFilter() {

    cards.forEach(card => {

      const g = card.dataset.group;

      const groupMatch =
        activeGroup === "all" || activeGroup === g;

      if (!groupMatch) {
        card.style.display = "none";
        return;
      }

      card.style.display = "block";

      const index =
        Number(card.dataset.indexInGroup);

      // порядок внутри темы
      card.style.opacity = "0";
      card.style.transform = "translateY(16px)";

      setTimeout(() => {

        if (activeType === "new") {
          card.style.order = index;
        } else {
          card.style.order = 100 - index;
        }

        requestAnimationFrame(() => {
          card.style.opacity = "1";
          card.style.transform = "translateY(0)";
        });

      }, 80);

    });

  }

  // GROUP CLICK
  groupChips.forEach(chip => {

    chip.addEventListener("click", () => {

      groupChips.forEach(c =>
        c.classList.remove("active")
      );

      chip.classList.add("active");

      activeGroup = chip.dataset.group;

      applyFilter();

    });

  });

  // TYPE CLICK
  typeChips.forEach(chip => {

    chip.addEventListener("click", () => {

      typeChips.forEach(c =>
        c.classList.remove("active")
      );

      chip.classList.add("active");

      activeType = chip.dataset.type;

      applyFilter();

    });

  });

  applyFilter();

</script>

</body>
</html>
